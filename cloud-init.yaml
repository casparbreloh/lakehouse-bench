#cloud-config
package_update: true

runcmd:
  - >-
    /bin/bash -c 'set -Eeuo pipefail;
    mkdir -p /etc/apt/keyrings /var/lib/lakehouse-bench;
    apt-get install --yes ca-certificates curl;
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg;
    chmod a+r /etc/apt/keyrings/docker.gpg;
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list;
    apt-get update;
    apt-get install --yes docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin;
    systemctl enable --now docker;
    docker version >/var/lib/lakehouse-bench/docker-version.txt 2>&1;
    docker buildx version >>/var/lib/lakehouse-bench/docker-version.txt 2>&1;
    docker compose version >>/var/lib/lakehouse-bench/docker-version.txt 2>&1;
    touch /var/lib/lakehouse-bench/ready'
